<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Kho Vô Khuẩn - CSSD</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h2 { color: #0056b3; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dddddd; text-align: left; padding: 12px; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .no-data { text-align: center; padding: 20px; color: #666; font-style: italic; }
        .status-fail { color: red; font-weight: bold; }
        .status-pass { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>SỔ THEO DÕI MẺ HẤP LÂM SÀNG - WEB CSSD</h2>
    <div id="loading" style="text-align: center; font-weight: bold;">Đang tải dữ liệu mẻ hấp mới nhất...</div>
    
    <table id="dataTable" style="display: none;">
        <thead>
            <tr>
                <th>Ngày</th>
                <th>Máy Hấp</th>
                <th>Số Mẻ</th>
                <th>Mã Batch</th>
                <th>Nhân Viên Kết Luận</th>
                <th>Thời Gian Kết Thúc</th>
                <th>Thời Gian Đọc BI</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Dữ liệu mẻ hấp sẽ tự động điền vào đây -->
        </tbody>
    </table>
</div>

<script>
    // Hàm nạp và hiển thị dữ liệu từ luồng hệ thống gửi về email
    async function loadCssdData() {
        try {
            // Thay thế URL dưới đây bằng endpoint API hoặc cấu trúc đọc tệp data của anh nếu có
            // Hiện tại đang cấu hình đọc dữ liệu mẻ hấp mẫu từ luồng để tránh lỗi trắng trang
            const mockRawData = [
                { "NGÀY": "2026-06-12", "MÁY_x0020_HẤP_x0020_SỐ": "Máy 01", "SỐ_x0020_MẺ": "Mẻ 05", "MÃ_x0020_BATCH_x0020_CỦA_x0020_CHU_x0020_TRÌNH": "B20260612-01", "NHÂN_x0020_VIÊN_x0020_KẾT_x0020_LUẬN": "TRẦN THỊ THOA", "THỜI_x0020_GIAN_x0020_KẾT_x0020_THÚC_x0020_CHU_x0020_TRÌNH": "14:30", "THỜI_x0020_GIAN_x0020_ĐỌC_x0020_TEST": "14:55" }
            ];

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (mockRawData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="no-data">Hiện chưa có dữ liệu mẻ hấp nào được đồng bộ.</td></tr>';
            } else {
                mockRawData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item["NGÀY"] || ''}</td>
                        <td>${item["MÁY_x0020_HẤP_x0020_SỐ"] || ''}</td>
                        <td>${item["SỐ_x0020_MẺ"] || ''}</td>
                        <td>${item["MÃ_x0020_BATCH_x0020_CỦA_x0020_CHU_x0020_TRÌNH"] || ''}</td>
                        <td>${item["NHÂN_x0020_VIÊN_x0020_KẾT_x0020_LUẬN"] || ''}</td>
                        <td>${item["THỜI_x0020_GIAN_x0020_KẾT_x0020_THÚC_x0020_CHU_x0020_TRÌNH"] || ''}</td>
                        <td>${item["THỜI_x0020_GIAN_x0020_ĐỌC_x0020_TEST"] || ''}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';

        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
            document.getElementById('loading').innerText = "Có lỗi xảy ra khi nạp cấu trúc dữ liệu mẻ hấp!";
        }
    }

    // Tự động chạy khi trang web được tải xong
    window.onload = loadCssdData;
</script>
</body>
</html>
