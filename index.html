<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Quản Lý Kho Vô Khuẩn - CSSD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { max-width: 100%; overflow-x: hidden; height: 100%; background-color: #f4f7f9; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .sidebar-item-active { background-color: #0b6983 !important; color: #ffffff !important; border-left: 4px solid #00a896; }
        .tab-active-custom { border-bottom: 3px solid #0b6983; color: #0b6983; font-weight: 700; }
    </style>
</head>
<body class="font-sans flex flex-col md:flex-row h-screen overflow-hidden text-slate-700">

    <div class="w-full md:w-64 bg-[#0f4c5c] text-slate-200 flex flex-col justify-between flex-shrink-0 z-20 shadow-xl">
        <div>
            <div class="p-4 bg-[#0b3c49] border-b border-[#0d3f4d] font-bold text-teal-400">CSSD PHƯƠNG NAM</div>
            <nav class="flex flex-row md:flex-col p-2 space-y-0.5">
                <a href="#" onclick="switchTab('chuTrinhTab')" id="menu-chuTrinhTab" class="sidebar-item-active flex items-center space-x-3 px-4 py-3 rounded-md text-xs font-medium transition">
                    <i class="fa-solid fa-rotate w-4"></i> <span>Theo dõi vòng đời</span>
                </a>
                <a href="#" onclick="switchTab('trangchu')" id="menu-trangchu" class="flex items-center space-x-3 px-4 py-3 rounded-md hover:bg-[#145d70] text-xs font-medium transition">
                    <i class="fa-solid fa-flask-vial w-4"></i> <span>Giám sát Test BI</span>
                </a>
                <a href="#" onclick="switchTab('giaonhan')" id="menu-giaonhan" class="flex items-center space-x-3 px-4 py-3 rounded-md hover:bg-[#145d70] text-xs font-medium transition">
                    <i class="fa-solid fa-boxes-stacked w-4"></i> <span>Danh mục Bộ dụng cụ</span>
                </a>
            </nav>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto w-full">
        <header class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
            <h2 id="header-title" class="text-sm font-bold text-slate-800">Vận hành Chu trình Vô khuẩn</h2>
        </header>

        <main class="p-5 w-full space-y-4">
            <div id="tab-chuTrinhTab" class="space-y-4">
                <div id="divDanhSachChuTrinh" class="bg-white rounded border divide-y"></div>
            </div>

            <div id="tab-trangchu" class="hidden space-y-4">
                <div class="bg-white p-4 rounded border shadow-sm">
                    <h3 class="font-bold mb-2">⏱️ Kiểm soát chất lượng (BI)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="startTime" class="border rounded p-2">
                        <input type="time" id="endTime" class="border rounded p-2">
                    </div>
                    <button onclick="checkBiStatus()" class="mt-4 w-full bg-[#0b6983] text-white py-2 rounded font-bold">Phân tích kết quả</button>
                    <div id="resultBox" class="hidden mt-4 p-4 rounded border"></div>
                </div>
            </div>

            <div id="tab-giaonhan" class="hidden space-y-4">
                <div class="bg-white p-4 rounded border">
                    <select id="selectBoDungCu" onchange="loadChiTietBo()" class="w-full border p-2 mb-4">
                        <option value="">-- Chọn bộ dụng cụ --</option>
                        <option value="SOSINH">BỘ SƠ SINH</option>
                        <option value="MOBATCON">BỘ MỔ BẮT CON</option>
                    </select>
                    <div id="khuVucDanhSach" class="hidden">
                        <table class="w-full text-xs text-left">
                            <thead class="bg-slate-50 border-b">
                                <tr id="tableHeaderRow"></tr>
                            </thead>
                            <tbody id="bodyChiTietDungCu"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Data gốc giữ nguyên, chỉ sửa logic hiển thị
        const trackingList = [
            { id: "SOSINH", tenBo: "BỘ SƠ SINH", step: 4, ngayHap: "12-06-2026", hanDung: "12-07-2026", ghiChu: "Vô trùng" },
            { id: "MOBATCON", tenBo: "BỘ MỔ BẮT CON", step: 1, ngayHap: "--", hanDung: "--", ghiChu: "Bẩn" }
        ];

        function switchTab(tabName) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        }

        function checkBiStatus() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if(!start || !end) return alert("Nhập đủ giờ!");
            
            // Logic xử lý thời gian không lỗi
            const s = start.split(':').map(Number);
            const e = end.split(':').map(Number);
            const duration = (e[0]*60 + e[1]) - (s[0]*60 + s[1]);
            
            const box = document.getElementById('resultBox');
            box.classList.remove('hidden');
            if(duration > 30) {
                box.className = "mt-4 p-4 rounded border bg-red-50 text-red-700";
                box.innerHTML = "❌ FAIL: Thời gian ủ quá 30 phút (" + duration + "p)";
            } else {
                box.className = "mt-4 p-4 rounded border bg-emerald-50 text-emerald-700";
                box.innerHTML = "✅ PASS: Kết quả đạt (" + duration + "p)";
            }
        }

        window.onload = function() { hienThiChuTrinhVôKhuan(); };

        function hienThiChuTrinhVôKhuan() {
            const container = document.getElementById("divDanhSachChuTrinh");
            container.innerHTML = "";
            trackingList.forEach(item => {
                container.innerHTML += `<div class="p-4 flex justify-between">
                    <div><h4 class="font-bold">${item.tenBo}</h4><span class="text-xs text-slate-500">${item.ghiChu}</span></div>
                    <div class="text-sm font-bold text-slate-700">${item.ngayHap}</div>
                </div>`;
            });
        }
    </script>
</body>
</html>
